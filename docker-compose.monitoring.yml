# ===========================================
# 监控系统 Docker Compose 配置
# Prometheus + Grafana + Alertmanager + Exporters
# ===========================================

version: '3.8'

services:
  # Prometheus - 指标采集和存储
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: agentforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - monitoring-network
    depends_on:
      - node-exporter
      - postgres-exporter
      - redis-exporter

  # Grafana - 可视化仪表板
  grafana:
    image: grafana/grafana:10.0.0
    container_name: agentforge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.your-domain.com
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitoring-network
    depends_on:
      - prometheus

  # Alertmanager - 告警管理
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: agentforge-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - monitoring-network

  # Node Exporter - 系统指标
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: agentforge-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-network

  # Postgres Exporter - PostgreSQL 指标
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: agentforge-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-agentforge}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB:-agentforge}?sslmode=disable
    networks:
      - monitoring-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Redis Exporter - Redis 指标
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: agentforge-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://host.docker.internal:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - monitoring-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Nginx Exporter - Nginx 指标
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: agentforge-nginx-exporter
    restart: unless-stopped
    ports:
      - "9113:9113"
    command:
      - '-nginx.scrape-uri=http://host.docker.internal:80/stub_status'
    networks:
      - monitoring-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Loki - 日志聚合
  loki:
    image: grafana/loki:2.9.0
    container_name: agentforge-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network

  # Promtail - 日志采集
  promtail:
    image: grafana/promtail:2.9.0
    container_name: agentforge-promtail
    restart: unless-stopped
    volumes:
      - ./loki/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/agentforge:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring-network
    depends_on:
      - loki

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local

networks:
  monitoring-network:
    driver: bridge
  agentforge-network:
    external:
      name: agentforge_agentforge-network
