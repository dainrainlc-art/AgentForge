version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: agentforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - agentforge_network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: agentforge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./docker/monitoring/grafana:/var/lib/grafana
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    networks:
      - agentforge_network
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.8.0
    container_name: agentforge-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/monitoring/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - agentforge_network

  promtail:
    image: grafana/promtail:2.8.0
    container_name: agentforge-promtail
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/promtail:/etc/promtail
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - agentforge_network

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: agentforge-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - agentforge_network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  agentforge_network:
    external: true
