name: AgentForge CI/CD Enhanced

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每天凌晨 3 点运行安全扫描
    - cron: '0 3 * * *'

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. 代码质量检查
  lint:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit safety
          pip install -r requirements.txt
      
      - name: Run Ruff (Linter)
        run: ruff check agentforge/ integrations/ --output-format=github
      
      - name: Run Black (Formatter)
        run: black --check --diff agentforge/ integrations/
      
      - name: Run MyPy (Type Checker)
        run: mypy agentforge/ integrations/ --ignore-missing-imports --show-error-codes
        continue-on-error: true
      
      - name: Run Bandit (Security Linter)
        run: bandit -r agentforge/ integrations/ -f json -o bandit-report.json || true
      
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # 2. 依赖安全扫描
  dependency-check:
    name: 🔒 Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Check Python dependencies
        run: |
          pip install safety
          safety check -r requirements.txt --full-report || true
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Check Node.js dependencies
        working-directory: frontend
        run: |
          npm audit --audit-level=moderate || true

  # 3. 单元测试
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-xdist
      
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=agentforge --cov=integrations --cov-report=xml -n auto
        env:
          QIANFAN_API_KEY: ${{ secrets.QIANFAN_API_KEY }}
          JWT_SECRET_KEY: test_secret_key_for_ci_testing_at_least_32_chars
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # 4. 集成测试
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: agentforge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql://agentforge:test_password@localhost:5432/agentforge_test
          REDIS_URL: redis://localhost:6379/0
          QIANFAN_API_KEY: ${{ secrets.QIANFAN_API_KEY }}
          JWT_SECRET_KEY: test_secret_key_for_ci_testing_at_least_32_chars

  # 5. 前端构建和测试
  frontend:
    name: 🎨 Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      
      - name: Type check
        working-directory: frontend
        run: npm run type-check || true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # 6. Docker 构建
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: false
          tags: agentforge-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: agentforge-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 7. 安全扫描
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.schedule == '0 3 * * *'
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 8. 性能测试
  performance-test:
    name: ⚡ Performance Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install locust
          pip install -r requirements.txt
      
      - name: Run performance tests
        run: |
          cd tests/performance
          locust -f benchmark.py --headless -u 10 -r 2 --run-time 1m || true

  # 9. 文档生成
  docs:
    name: 📚 Generate Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Generate API documentation
        run: |
          python -c "
          import asyncio
          from integrations.api.docs_generator import APIDocGenerator, init_api_docs
          from integrations.api.main import app
          
          async def generate():
              doc_gen = init_api_docs(app)
              doc_gen.export_openapi_json('docs/api/openapi.json')
              doc_gen.export_openapi_yaml('docs/api/openapi.yaml')
              doc_gen.generate_markdown_docs('docs/api/README.md')
          
          asyncio.run(generate())
          "
      
      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: docs/api/

  # 10. 发布
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate release notes
        run: |
          echo "## Changes in this release" > RELEASE_NOTES.md
          git log --oneline -20 >> RELEASE_NOTES.md
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
