version: '3.8'

services:
  agentforge-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentforge-api:latest
    container_name: agentforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QIANFAN_API_KEY=${QIANFAN_API_KEY}
      - QIANFAN_BASE_URL=${QIANFAN_BASE_URL:-https://qianfan.baidubce.com/v2/coding}
      - QIANFAN_DEFAULT_MODEL=${QIANFAN_DEFAULT_MODEL:-glm-5}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-agentforge}
      - POSTGRES_USER=${POSTGRES_USER:-agentforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agentforge-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  agentforge-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: agentforge-frontend:latest
    container_name: agentforge-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - agentforge-api
    networks:
      - agentforge-network

  nginx:
    image: nginx:alpine
    container_name: agentforge-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - agentforge-api
      - agentforge-frontend
    networks:
      - agentforge-network

  postgres:
    image: postgres:15-alpine
    container_name: agentforge-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agentforge}
      - POSTGRES_USER=${POSTGRES_USER:-agentforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentforge} -d ${POSTGRES_DB:-agentforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentforge-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentforge-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentforge-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - agentforge-network

  n8n:
    image: n8nio/n8n:latest
    container_name: agentforge-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/webhook/}
      - EXECUTIONS_MODE=regular
      - GENERIC_TIMEZONE=${TZ:-Asia/Shanghai}
      - N8N_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - agentforge-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  n8n-data:
    driver: local

networks:
  agentforge-network:
    driver: bridge
