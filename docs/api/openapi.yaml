components:
  schemas:
    BackupRequest:
      properties:
        backup_type:
          default: full
          title: Backup Type
          type: string
        include_postgres:
          default: true
          title: Include Postgres
          type: boolean
        include_qdrant:
          default: true
          title: Include Qdrant
          type: boolean
        include_redis:
          default: true
          title: Include Redis
          type: boolean
      title: BackupRequest
      type: object
    BuyerAnalytics:
      properties:
        repeat_buyer_rate:
          title: Repeat Buyer Rate
          type: number
        repeat_buyers:
          title: Repeat Buyers
          type: integer
        top_buyers:
          items:
            additionalProperties: true
            type: object
          title: Top Buyers
          type: array
        total_buyers:
          title: Total Buyers
          type: integer
      required:
      - total_buyers
      - repeat_buyers
      - repeat_buyer_rate
      - top_buyers
      title: BuyerAnalytics
      type: object
    ChatRequest:
      properties:
        agent:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent
        context:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Context
        conversation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Conversation Id
        message:
          title: Message
          type: string
      required:
      - message
      title: ChatRequest
      type: object
    ChatResponse:
      properties:
        agent:
          title: Agent
          type: string
        conversation_id:
          title: Conversation Id
          type: string
        model:
          title: Model
          type: string
        response:
          title: Response
          type: string
      required:
      - response
      - conversation_id
      - agent
      - model
      title: ChatResponse
      type: object
    ConfigField:
      description: Configuration field model
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        key:
          title: Key
          type: string
        label:
          title: Label
          type: string
        max_value:
          anyOf:
          - type: number
          - type: 'null'
          title: Max Value
        min_value:
          anyOf:
          - type: number
          - type: 'null'
          title: Min Value
        options:
          anyOf:
          - items: {}
            type: array
          - type: 'null'
          title: Options
        placeholder:
          anyOf:
          - type: string
          - type: 'null'
          title: Placeholder
        required:
          default: false
          title: Required
          type: boolean
        sensitive:
          default: false
          title: Sensitive
          type: boolean
        type:
          title: Type
          type: string
        value:
          title: Value
      required:
      - key
      - label
      - type
      - value
      title: ConfigField
      type: object
    ConfigGroup:
      description: Configuration group model
      properties:
        description:
          title: Description
          type: string
        fields:
          items:
            $ref: '#/components/schemas/ConfigField'
          title: Fields
          type: array
        icon:
          title: Icon
          type: string
        id:
          title: Id
          type: string
        title:
          title: Title
          type: string
      required:
      - id
      - title
      - icon
      - description
      - fields
      title: ConfigGroup
      type: object
    ConfigResponse:
      description: Configuration response model
      properties:
        groups:
          items:
            $ref: '#/components/schemas/ConfigGroup'
          title: Groups
          type: array
        last_updated:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Updated
      required:
      - groups
      title: ConfigResponse
      type: object
    ConfigSaveResponse:
      description: Configuration save response model
      properties:
        message:
          title: Message
          type: string
        requires_restart:
          default: false
          title: Requires Restart
          type: boolean
        success:
          title: Success
          type: boolean
      required:
      - success
      - message
      title: ConfigSaveResponse
      type: object
    ConfigTestResult:
      description: Configuration test result model
      properties:
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Details
        message:
          title: Message
          type: string
        service:
          title: Service
          type: string
        status:
          title: Status
          type: string
      required:
      - service
      - status
      - message
      title: ConfigTestResult
      type: object
    ConfigUpdateRequest:
      description: Configuration update request model
      properties:
        key:
          title: Key
          type: string
        value:
          title: Value
      required:
      - key
      - value
      title: ConfigUpdateRequest
      type: object
    ConversationHistory:
      properties:
        messages:
          items:
            additionalProperties: true
            type: object
          title: Messages
          type: array
        total:
          title: Total
          type: integer
      required:
      - messages
      - total
      title: ConversationHistory
      type: object
    DashboardSummary:
      properties:
        buyers:
          $ref: '#/components/schemas/BuyerAnalytics'
        charts:
          additionalProperties: true
          title: Charts
          type: object
        orders:
          $ref: '#/components/schemas/OrderAnalytics'
        performance:
          $ref: '#/components/schemas/PerformanceMetrics'
        recent_activity:
          items:
            additionalProperties: true
            type: object
          title: Recent Activity
          type: array
        revenue:
          $ref: '#/components/schemas/RevenueStats'
      required:
      - revenue
      - orders
      - buyers
      - performance
      - recent_activity
      - charts
      title: DashboardSummary
      type: object
    DocsGenerateRequest:
      description: Request model for docs generation
      properties:
        formats:
          default:
          - json
          - yaml
          - markdown
          items:
            type: string
          title: Formats
          type: array
        output_dir:
          default: docs/api
          title: Output Dir
          type: string
      title: DocsGenerateRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthStatus:
      properties:
        services:
          additionalProperties: true
          title: Services
          type: object
        status:
          title: Status
          type: string
        timestamp:
          title: Timestamp
          type: string
        version:
          title: Version
          type: string
      required:
      - status
      - timestamp
      - version
      - services
      title: HealthStatus
      type: object
    KnowledgeCreate:
      properties:
        content:
          title: Content
          type: string
        source:
          default: manual
          title: Source
          type: string
        tags:
          default: []
          items:
            type: string
          title: Tags
          type: array
        title:
          title: Title
          type: string
      required:
      - title
      - content
      title: KnowledgeCreate
      type: object
    KnowledgeItem:
      properties:
        content:
          title: Content
          type: string
        created_at:
          title: Created At
          type: string
        id:
          title: Id
          type: string
        source:
          title: Source
          type: string
        tags:
          items:
            type: string
          title: Tags
          type: array
        title:
          title: Title
          type: string
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
      required:
      - id
      - title
      - content
      - source
      - tags
      - created_at
      title: KnowledgeItem
      type: object
    KnowledgeListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/KnowledgeItem'
          title: Items
          type: array
        total:
          title: Total
          type: integer
      required:
      - items
      - total
      title: KnowledgeListResponse
      type: object
    OrderAnalytics:
      properties:
        active_orders:
          title: Active Orders
          type: integer
        average_response_time_hours:
          title: Average Response Time Hours
          type: number
        cancelled_orders:
          title: Cancelled Orders
          type: integer
        completed_orders:
          title: Completed Orders
          type: integer
        completion_rate:
          title: Completion Rate
          type: number
        on_time_delivery_rate:
          title: On Time Delivery Rate
          type: number
        total_orders:
          title: Total Orders
          type: integer
      required:
      - total_orders
      - active_orders
      - completed_orders
      - cancelled_orders
      - completion_rate
      - on_time_delivery_rate
      - average_response_time_hours
      title: OrderAnalytics
      type: object
    OrderListResponse:
      properties:
        orders:
          items:
            $ref: '#/components/schemas/OrderResponse'
          title: Orders
          type: array
        total:
          title: Total
          type: integer
      required:
      - orders
      - total
      title: OrderListResponse
      type: object
    OrderResponse:
      properties:
        buyer_username:
          title: Buyer Username
          type: string
        created_at:
          title: Created At
          type: string
        currency:
          title: Currency
          type: string
        description:
          title: Description
          type: string
        id:
          title: Id
          type: string
        price:
          title: Price
          type: number
        seller_username:
          title: Seller Username
          type: string
        status:
          title: Status
          type: string
        updated_at:
          title: Updated At
          type: string
      required:
      - id
      - buyer_username
      - seller_username
      - status
      - price
      - currency
      - description
      - created_at
      - updated_at
      title: OrderResponse
      type: object
    OrderStatsResponse:
      properties:
        active:
          title: Active
          type: integer
        completed:
          title: Completed
          type: integer
        pending:
          title: Pending
          type: integer
        revenue:
          title: Revenue
          type: number
        total:
          title: Total
          type: integer
      required:
      - total
      - active
      - pending
      - completed
      - revenue
      title: OrderStatsResponse
      type: object
    PasswordChange:
      properties:
        new_password:
          title: New Password
          type: string
        old_password:
          title: Old Password
          type: string
      required:
      - old_password
      - new_password
      title: PasswordChange
      type: object
    PerformanceMetrics:
      properties:
        average_rating:
          title: Average Rating
          type: number
        customer_satisfaction:
          title: Customer Satisfaction
          type: number
        order_acceptance_rate:
          title: Order Acceptance Rate
          type: number
        response_rate:
          title: Response Rate
          type: number
      required:
      - response_rate
      - order_acceptance_rate
      - customer_satisfaction
      - average_rating
      title: PerformanceMetrics
      type: object
    PricingRequest:
      properties:
        category:
          title: Category
          type: string
        complexity:
          title: Complexity
          type: string
        estimated_hours:
          title: Estimated Hours
          type: number
        strategy:
          default: value
          title: Strategy
          type: string
        urgency:
          default: standard
          title: Urgency
          type: string
      required:
      - category
      - complexity
      - estimated_hours
      title: PricingRequest
      type: object
    QuotationRequest:
      properties:
        buyer_username:
          title: Buyer Username
          type: string
        custom_requirements:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Custom Requirements
        discount_percent:
          default: 0.0
          title: Discount Percent
          type: number
        project_title:
          title: Project Title
          type: string
        request_text:
          title: Request Text
          type: string
        urgency:
          default: standard
          title: Urgency
          type: string
      required:
      - request_text
      - buyer_username
      - project_title
      title: QuotationRequest
      type: object
    RestoreRequest:
      properties:
        backup_id:
          title: Backup Id
          type: string
        drop_existing:
          default: false
          title: Drop Existing
          type: boolean
        include_postgres:
          default: true
          title: Include Postgres
          type: boolean
        include_qdrant:
          default: true
          title: Include Qdrant
          type: boolean
        include_redis:
          default: true
          title: Include Redis
          type: boolean
      required:
      - backup_id
      title: RestoreRequest
      type: object
    RevenueStats:
      properties:
        average_order_value:
          title: Average Order Value
          type: number
        last_month:
          title: Last Month
          type: number
        month_over_month_change:
          title: Month Over Month Change
          type: number
        this_month:
          title: This Month
          type: number
        total_revenue:
          title: Total Revenue
          type: number
      required:
      - total_revenue
      - this_month
      - last_month
      - month_over_month_change
      - average_order_value
      title: RevenueStats
      type: object
    ScheduleUpdateRequest:
      properties:
        daily_enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Daily Enabled
        daily_time:
          anyOf:
          - type: string
          - type: 'null'
          title: Daily Time
        retention_days:
          anyOf:
          - type: integer
          - type: 'null'
          title: Retention Days
        weekly_day:
          anyOf:
          - type: integer
          - type: 'null'
          title: Weekly Day
        weekly_enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Weekly Enabled
      title: ScheduleUpdateRequest
      type: object
    Token:
      properties:
        access_token:
          title: Access Token
          type: string
        expires_in:
          title: Expires In
          type: integer
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
        token_type:
          default: bearer
          title: Token Type
          type: string
      required:
      - access_token
      - expires_in
      title: Token
      type: object
    TokenRefresh:
      properties:
        refresh_token:
          title: Refresh Token
          type: string
      required:
      - refresh_token
      title: TokenRefresh
      type: object
    UserLogin:
      properties:
        password:
          title: Password
          type: string
        username:
          title: Username
          type: string
      required:
      - username
      - password
      title: UserLogin
      type: object
    UserRegister:
      properties:
        email:
          format: email
          title: Email
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        password:
          title: Password
          type: string
      required:
      - email
      - password
      title: UserRegister
      type: object
    UserResponse:
      properties:
        created_at:
          title: Created At
          type: string
        email:
          title: Email
          type: string
        id:
          title: Id
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      required:
      - id
      - email
      - name
      - created_at
      title: UserResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: AgentForge - AI 驱动的 Fiverr 运营自动化智能助理系统
  title: AgentForge
  version: 1.0.0
openapi: 3.1.0
paths:
  /:
    get:
      description: Root endpoint
      operationId: root__get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Root
  /api/auth/change-password:
    post:
      description: Change user password
      operationId: change_password_api_auth_change_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Change Password
      tags:
      - auth
  /api/auth/login:
    post:
      description: Login and get access token
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Login
      tags:
      - auth
  /api/auth/logout:
    post:
      description: Logout and revoke token
      operationId: logout_api_auth_logout_post
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Logout
      tags:
      - auth
  /api/auth/me:
    get:
      description: Get current user info
      operationId: get_current_user_api_auth_me_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
      summary: Get Current User
      tags:
      - auth
  /api/auth/refresh:
    post:
      description: Refresh access token
      operationId: refresh_token_api_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Refresh Token
      tags:
      - auth
  /api/auth/register:
    post:
      description: Register new user
      operationId: register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Register
      tags:
      - auth
  /api/auth/verify:
    get:
      description: Verify authentication status
      operationId: verify_auth_api_auth_verify_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Verify Auth
      tags:
      - auth
  /api/backup/create:
    post:
      description: Create a new backup
      operationId: create_backup_api_backup_create_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Backup
      tags:
      - backup
  /api/backup/list:
    get:
      description: List available backups
      operationId: list_backups_api_backup_list_get
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Backups
      tags:
      - backup
  /api/backup/restore:
    post:
      description: Restore from a backup
      operationId: restore_backup_api_backup_restore_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Restore Backup
      tags:
      - backup
  /api/backup/retention/apply:
    post:
      description: Apply retention policy
      operationId: apply_retention_policy_api_backup_retention_apply_post
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Apply Retention Policy
      tags:
      - backup
  /api/backup/schedule:
    put:
      description: Update backup schedule configuration
      operationId: update_schedule_api_backup_schedule_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleUpdateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Schedule
      tags:
      - backup
  /api/backup/stats/summary:
    get:
      description: Get backup statistics
      operationId: get_backup_stats_api_backup_stats_summary_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Backup Stats
      tags:
      - backup
  /api/backup/status:
    get:
      description: Get backup scheduler status
      operationId: get_backup_status_api_backup_status_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Backup Status
      tags:
      - backup
  /api/backup/{backup_id}:
    delete:
      description: Delete a backup
      operationId: delete_backup_api_backup__backup_id__delete
      parameters:
      - in: path
        name: backup_id
        required: true
        schema:
          title: Backup Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Backup
      tags:
      - backup
    get:
      description: Get backup details
      operationId: get_backup_api_backup__backup_id__get
      parameters:
      - in: path
        name: backup_id
        required: true
        schema:
          title: Backup Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Backup
      tags:
      - backup
  /api/backup/{backup_id}/verify:
    get:
      description: Verify backup integrity
      operationId: verify_backup_api_backup__backup_id__verify_get
      parameters:
      - in: path
        name: backup_id
        required: true
        schema:
          title: Backup Id
          type: string
      responses:
